  - title: "User Input"
    section: "B"
    image: "/buttons/github.png"
    link: "/personal/finaltri2"
    alt: "Event-driven input in GameBuilder"
    keyPoints:
      - "Button click creates NPC slots"
      - "Slider `input` events update player position"
      - "Input is event-triggered from UI actions"
    subtitle: "Input Requirement"
    description: |
      Example event listeners:

      ```javascript
      if (ui.addNpcBtn) {
        ui.addNpcBtn.addEventListener('click', () => {
          const slot = makeNpcSlot(ui.npcs.length + 1);
        });
      }

      if (ui.pX) ui.pX.addEventListener('input', updatePlayerPositionInEditor);
      if (ui.pY) ui.pY.addEventListener('input', updatePlayerPositionInEditor);
      ```

  - title: "List Data Abstraction"
    section: "B"
    image: "/image_matrix.png"
    link: "/personal/finaltri2"
    alt: "Arrays and iteration for complexity management"
    keyPoints:
      - "Uses `npcs`, `walls`, and `drawShapes` arrays"
      - "Processes all items with `forEach`"
      - "Avoids repeated variables like `npc1`, `npc2`"
      - "Scales as object count changes"
    subtitle: "List Requirement"
    description: |
      Collections centralize related data and iteration applies one logic path to many objects, reducing code duplication and managing complexity.

      ```javascript
      const ui = {
        npcs: [],
        walls: [],
        drawShapes: []
      };

      ui.npcs.forEach((slot, idx) => {
        const nx = npc_extract(slot, assets);
        const npcCode = npc_code(nx, idx + 1, false);
        defs.push(npcCode.def);
        classes.push(npcCode.classEntry);
      });
      ```

  - title: "Procedure + Algorithm"
    section: "B"
    image: "/classStructures.png"
    link: "/personal/finaltri2"
    alt: "Student-developed procedure and algorithm structure"
    keyPoints:
      - "Procedure: `barriers_generate(walls, drawShapes, options = {})`"
      - "Selection: defaults and barrier-type filtering"
      - "Iteration: loops through walls and drawn barriers"
      - "Output: returns `{ defs, classes }`"
    subtitle: "Procedure + Algorithm Requirement"
    description: |
      Core procedure signature:

      ```javascript
      function barriers_generate(walls, drawShapes, options = {}) {
        const defs = [];
        const classes = [];
        return { defs, classes };
      }
      ```

  - title: "Procedure Calls + Output"
    section: "B"
    image: "/web_server.png"
    link: "/personal/finaltri2"
    alt: "Calls to custom procedure and visual output"
    keyPoints:
      - "Multiple call sites show reusable procedure"
      - "Generated defs/classes feed final game output"
      - "Overlay rendering reflects user-created shapes"
      - "Run action updates game display"
    subtitle: "Calls + Output Requirement"
    description: |
      The program calls the same custom procedure in different places, then uses returned structures and rendering logic to produce visible on-screen changes from user input.

      ```javascript
      // Procedure call example
      const generated = barriers_generate(ui.walls, ui.drawShapes, { visible: true });
      defs.push(...generated.defs);
      classes.push(...generated.classes);
      ```

      ```javascript
      // Output example
      function renderDrawShapes() {
        ui.drawOverlay.innerHTML = '';
        ui.drawShapes.forEach(shape => {
          const el = document.createElement('div');
          el.className = `draw-rect ${shape.type}`;
          el.style.left = shape.x + 'px';
          el.style.top = shape.y + 'px';
          ui.drawOverlay.appendChild(el);
        });
      }
      ```
